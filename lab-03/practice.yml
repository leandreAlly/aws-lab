AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lab 03 - Securely deploying resources in a VPC.
  Multi-AZ VPC: 2 public + 2 private subnets, AZ-aligned NAT gateways,
  2 public web instances (Apache) + 2 private app instances,
  all managed via SSM Session Manager only (no SSH).

Parameters:
  FullName:
    Type: String
    Default: Leandre Tuyambaze
  LabName:
    Type: String
    Default: 'Lab 03 - Securely Deploying Resources in a VPC'
  InstanceType:
    Type: String
    Default: t3.micro
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnetACidr:
    Type: String
    Default: 10.0.0.0/24
  PublicSubnetBCidr:
    Type: String
    Default: 10.0.1.0/24
  PrivateSubnetACidr:
    Type: String
    Default: 10.0.10.0/24
  PrivateSubnetBCidr:
    Type: String
    Default: 10.0.11.0/24

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: lab03-vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: lab03-public-subnet-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: lab03-public-subnet-b

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: lab03-private-subnet-a

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: lab03-private-subnet-b

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: lab03-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  NatEipA:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab03-nat-eip-a

  NatEipB:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab03-nat-eip-b

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      SubnetId: !Ref PublicSubnetA
      AllocationId: !GetAtt NatEipA.AllocationId
      Tags:
        - Key: Name
          Value: lab03-nat-a

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      SubnetId: !Ref PublicSubnetB
      AllocationId: !GetAtt NatEipB.AllocationId
      Tags:
        - Key: Name
          Value: lab03-nat-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: lab03-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: lab03-private-rt-a

  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: lab03-private-rt-b

  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  SsmInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab03-ssm-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: lab03-ssm-instance-role

  SsmInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: lab03-ssm-instance-profile
      Roles:
        - !Ref SsmInstanceRole

  PublicInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public web tier - HTTP from anywhere, ICMP echo from inside the VPC
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from the internet
        - IpProtocol: icmp
          FromPort: 8
          ToPort: -1
          CidrIp: !Ref VpcCidr
          Description: ICMP echo request from inside the VPC
      Tags:
        - Key: Name
          Value: lab03-public-sg

  PrivateInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Private app tier - ICMP echo from the public tier only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: icmp
          FromPort: 8
          ToPort: -1
          SourceSecurityGroupId: !Ref PublicInstanceSecurityGroup
          Description: ICMP echo request from public web instances
      Tags:
        - Key: Name
          Value: lab03-private-sg

  PublicWebInstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref PublicInstanceSecurityGroup
      IamInstanceProfile: !Ref SsmInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf install -y httpd
          TOKEN=$(curl -sX PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
          cat > /var/www/html/index.html <<EOF
          <html>
            <head><title>${LabName}</title></head>
            <body style="font-family: sans-serif; text-align: center; margin-top: 15%">
              <h1>${FullName}</h1>
              <h2>${LabName}</h2>
              <p>Served from availability zone: <strong>$AZ</strong></p>
            </body>
          </html>
          EOF
          systemctl enable --now httpd
      Tags:
        - Key: Name
          Value: lab03-public-web-a

  PublicWebInstanceB:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnetB
      SecurityGroupIds:
        - !Ref PublicInstanceSecurityGroup
      IamInstanceProfile: !Ref SsmInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf install -y httpd
          TOKEN=$(curl -sX PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
          cat > /var/www/html/index.html <<EOF
          <html>
            <head><title>${LabName}</title></head>
            <body style="font-family: sans-serif; text-align: center; margin-top: 15%">
              <h1>${FullName}</h1>
              <h2>${LabName}</h2>
              <p>Served from availability zone: <strong>$AZ</strong></p>
            </body>
          </html>
          EOF
          systemctl enable --now httpd
      Tags:
        - Key: Name
          Value: lab03-public-web-b

  PrivateAppInstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnetA
      SecurityGroupIds:
        - !Ref PrivateInstanceSecurityGroup
      IamInstanceProfile: !Ref SsmInstanceProfile
      Tags:
        - Key: Name
          Value: lab03-private-app-a

  PrivateAppInstanceB:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref PrivateInstanceSecurityGroup
      IamInstanceProfile: !Ref SsmInstanceProfile
      Tags:
        - Key: Name
          Value: lab03-private-app-b

Outputs:
  PublicWebUrlA:
    Description: Web page served by the public instance in AZ a
    Value: !Sub 'http://${PublicWebInstanceA.PublicIp}'
  PublicWebUrlB:
    Description: Web page served by the public instance in AZ b
    Value: !Sub 'http://${PublicWebInstanceB.PublicIp}'
  PrivateAppInstanceIdA:
    Description: Session Manager target - private instance in AZ a
    Value: !Ref PrivateAppInstanceA
  PrivateAppInstanceIdB:
    Description: Session Manager target - private instance in AZ b
    Value: !Ref PrivateAppInstanceB
  PrivateAppPrivateIpA:
    Description: Ping target for the public-to-private connectivity test
    Value: !GetAtt PrivateAppInstanceA.PrivateIp
  PrivateAppPrivateIpB:
    Description: Ping target for the public-to-private connectivity test
    Value: !GetAtt PrivateAppInstanceB.PrivateIp
